name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if (-not $version) { $version = '${{ github.ref_name }}' }
          if ($version -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Version must look like v0.1.0. Got: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Install frontend dependencies
        shell: pwsh
        run: npm ci
        working-directory: frontend

      - name: Prepare bundled runtimes
        shell: pwsh
        run: .\packaging\prepare-bundle.ps1

      - name: Build application
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'.TrimStart('v')
          wails build -clean -ldflags "-X main.appVersion=$version"

      - name: Package release assets
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $versionNumber = $version.TrimStart('v')
          $exe = 'build/bin/Hindsight Local Manager.exe'
          if (!(Test-Path -LiteralPath $exe)) { throw "Missing executable: $exe" }
          if (!(Test-Path -LiteralPath 'resources')) { throw "Missing bundled resources" }
          if (Test-Path -LiteralPath 'resources/models') { Remove-Item -LiteralPath 'resources/models' -Recurse -Force }
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -LiteralPath $exe -Destination 'dist/Hindsight Local Manager.exe' -Force

          New-Item -ItemType Directory -Path 'components/app', 'components/python/resources', 'components/node/resources', 'components/control-plane/resources' -Force | Out-Null
          Copy-Item -LiteralPath $exe -Destination 'components/app/Hindsight Local Manager.exe' -Force
          Copy-Item -LiteralPath 'resources/python' -Destination 'components/python/resources/python' -Recurse
          Copy-Item -LiteralPath 'resources/node' -Destination 'components/node/resources/node' -Recurse
          Copy-Item -LiteralPath 'resources/control-plane' -Destination 'components/control-plane/resources/control-plane' -Recurse
          $appAsset = "Hindsight-Local-Manager-$version-app.zip"
          $pythonAsset = "Hindsight-Local-Manager-$version-python.zip"
          $nodeAsset = "Hindsight-Local-Manager-$version-node.zip"
          $controlPlaneAsset = "Hindsight-Local-Manager-$version-control-plane.zip"
          Compress-Archive -LiteralPath 'components/app/Hindsight Local Manager.exe' -DestinationPath $appAsset -Force
          Compress-Archive -LiteralPath 'components/python/resources' -DestinationPath $pythonAsset -Force
          Compress-Archive -LiteralPath 'components/node/resources' -DestinationPath $nodeAsset -Force
          Compress-Archive -LiteralPath 'components/control-plane/resources' -DestinationPath $controlPlaneAsset -Force

          $installerAsset = "Hindsight-Local-Manager-$version-installer.exe"
          $assetBaseUrl = "https://github.com/${{ github.repository }}/releases/download/$version"
          & makensis /DAPP_VERSION=$versionNumber /DASSET_BASE_URL=$assetBaseUrl /DOUT_FILE="$((Join-Path (Get-Location) $installerAsset))" packaging\web-installer.nsi
          if (!(Test-Path -LiteralPath $installerAsset)) { throw "Missing installer: $installerAsset" }

          "exe_asset=dist/Hindsight Local Manager.exe" >> $env:GITHUB_OUTPUT
          "installer_asset=$installerAsset" >> $env:GITHUB_OUTPUT
          "app_asset=$appAsset" >> $env:GITHUB_OUTPUT
          "python_asset=$pythonAsset" >> $env:GITHUB_OUTPUT
          "node_asset=$nodeAsset" >> $env:GITHUB_OUTPUT
          "control_plane_asset=$controlPlaneAsset" >> $env:GITHUB_OUTPUT
        id: package

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Hindsight Local Manager ${{ steps.version.outputs.version }}
          files: |
            ${{ steps.package.outputs.exe_asset }}
            ${{ steps.package.outputs.installer_asset }}
            ${{ steps.package.outputs.app_asset }}
            ${{ steps.package.outputs.python_asset }}
            ${{ steps.package.outputs.node_asset }}
            ${{ steps.package.outputs.control_plane_asset }}
          generate_release_notes: true
          overwrite_files: true

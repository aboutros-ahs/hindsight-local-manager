name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if (-not $version) { $version = '${{ github.ref_name }}' }
          if ($version -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Version must look like v0.1.0. Got: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Resolve runtime version
        id: runtime
        shell: pwsh
        run: |
          $runtime = (Get-Content -LiteralPath 'packaging/runtime-version.txt' -Raw).Trim()
          if ($runtime -notmatch '^(v|runtime-v)\d+\.\d+\.\d+$') {
            throw "Runtime version must look like v0.1.0 or runtime-v0.1.0. Got: $runtime"
          }
          "version=$runtime" >> $env:GITHUB_OUTPUT

      - name: Verify runtime assets
        shell: pwsh
        run: |
          $runtime = '${{ steps.runtime.outputs.version }}'
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/$runtime"
          foreach ($kind in @('python', 'node', 'control-plane')) {
            $url = "$baseUrl/Hindsight-Local-Manager-$runtime-$kind.zip"
            Write-Host "Checking $url"
            Invoke-WebRequest -Uri $url -Method Head -MaximumRedirection 5 -UseBasicParsing | Out-Null
          }

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Install frontend dependencies
        shell: pwsh
        run: npm ci
        working-directory: frontend

      - name: Build application
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'.TrimStart('v')
          wails build -clean -ldflags "-X main.appVersion=$version"

      - name: Package release assets
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $versionNumber = $version.TrimStart('v')
          $runtimeVersion = '${{ steps.runtime.outputs.version }}'
          $exe = 'build/bin/Hindsight Local Manager.exe'
          if (!(Test-Path -LiteralPath $exe)) { throw "Missing executable: $exe" }
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -LiteralPath $exe -Destination 'dist/Hindsight Local Manager.exe' -Force

          New-Item -ItemType Directory -Path 'components/app' -Force | Out-Null
          Copy-Item -LiteralPath $exe -Destination 'components/app/Hindsight Local Manager.exe' -Force
          if (Test-Path -LiteralPath 'resources/integrations') {
            New-Item -ItemType Directory -Path 'components/app/resources' -Force | Out-Null
            Copy-Item -LiteralPath 'resources/integrations' -Destination 'components/app/resources/integrations' -Recurse
          }
          $appAsset = "Hindsight-Local-Manager-$version-app.zip"
          Compress-Archive -Path 'components/app/*' -DestinationPath $appAsset -Force

          $installerAsset = "Hindsight-Local-Manager-$version-installer.exe"
          $appAssetBaseUrl = "https://github.com/${{ github.repository }}/releases/download/$version"
          $runtimeAssetBaseUrl = "https://github.com/${{ github.repository }}/releases/download/$runtimeVersion"
          & makensis /DAPP_VERSION=$versionNumber /DAPP_ASSET_BASE_URL=$appAssetBaseUrl /DRUNTIME_VERSION=$runtimeVersion /DRUNTIME_ASSET_BASE_URL=$runtimeAssetBaseUrl /DOUT_FILE="$((Join-Path (Get-Location) $installerAsset))" packaging\web-installer.nsi
          if (!(Test-Path -LiteralPath $installerAsset)) { throw "Missing installer: $installerAsset" }

          "exe_asset=dist/Hindsight Local Manager.exe" >> $env:GITHUB_OUTPUT
          "installer_asset=$installerAsset" >> $env:GITHUB_OUTPUT
          "app_asset=$appAsset" >> $env:GITHUB_OUTPUT
        id: package

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Hindsight Local Manager ${{ steps.version.outputs.version }}
          files: |
            ${{ steps.package.outputs.exe_asset }}
            ${{ steps.package.outputs.installer_asset }}
            ${{ steps.package.outputs.app_asset }}
          generate_release_notes: true
          overwrite_files: true
